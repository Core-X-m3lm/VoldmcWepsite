<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>VoldMC</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep: #04415C;
            --mid: #0C7B93;
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.14);
            --aqua: #20C5B7;
            --aqua-dark: #0E8C80;
            --gold: #FFD93D;
            --text-main: #FFF8E7;
            --text-muted: #9FD8DD;
            --discord-purple: #8E5CFF;
            --danger: #FF6B6B;
            --success: #2ECC71;
            --ig-pink: #DC2743;
        }

        * { box-sizing: border-box; }

        html { scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { display: none; }

        body {
            background:
                radial-gradient(ellipse at 50% -10%, rgba(32, 197, 183, 0.25), transparent 55%),
                linear-gradient(180deg, var(--deep) 0%, var(--mid) 55%, var(--deep) 100%),
                url('ocean-background.jpg');
            background-size: cover, cover, 160%;
            background-position: center, center, 20% 30%;
            background-attachment: fixed, fixed, fixed;
            background-blend-mode: normal, normal, overlay;
            animation: ocean-drift 28s ease-in-out infinite alternate;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: default;
        }

        @keyframes ocean-drift {
            0%   { background-size: cover, cover, 160%; background-position: center, center, 15% 25%; }
            50%  { background-size: cover, cover, 180%; background-position: center, center, 85% 60%; }
            100% { background-size: cover, cover, 160%; background-position: center, center, 35% 80%; }
        }

        .bubbles { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }

        .trail-bubble {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.75), rgba(45,212,191,0.08) 70%);
            border: 1px solid rgba(255,255,255,0.45);
            pointer-events: none;
            z-index: 5;
            animation: trail-rise 1.1s ease-out forwards;
        }

        @keyframes trail-rise {
            0%   { transform: translateY(0) scale(1);   opacity: 0.9; }
            100% { transform: translateY(-55px) scale(0.25); opacity: 0; }
        }

        .ambient-bubble {
            position: fixed;
            bottom: -40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), rgba(45,212,191,0.05) 70%);
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 0;
            animation: bubble-float linear forwards;
        }

        @keyframes bubble-float {
            0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.85; }
            85%  { opacity: 0.55; }
            100% { transform: translateY(-115vh) translateX(var(--drift, 0px)) scale(1.2); opacity: 0; }
        }

        .page-content {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 60px;
        }

        /* ---------------- Header & IP / Port ---------------- */
        .header-section { text-align: center; margin-bottom: 40px; width: 100%; }

        .page-tag {
            display: inline-block;
            font-family: 'VT323', monospace;
            font-size: 16px;
            letter-spacing: 3px;
            color: var(--aqua);
            background: rgba(32, 197, 183, 0.12);
            border: 1px solid rgba(32, 197, 183, 0.3);
            border-radius: 999px;
            padding: 4px 14px;
            margin-bottom: 12px;
        }

        .server-title {
            font-family: 'VT323', monospace;
            font-size: 50px;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(255, 217, 61, 0.45), 2px 2px 0px var(--aqua-dark);
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .server-subtitle {
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: var(--aqua);
            letter-spacing: 5px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(32, 197, 183, 0.55);
        }

        .ip-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .ip-box {
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px 26px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-block;
            min-width: 220px;
        }

        .ip-box:hover { border-color: var(--aqua); box-shadow: 0 0 14px rgba(32, 197, 183, 0.3); transform: translateY(-2px); }

        .ip-label { color: var(--aqua); font-size: 12px; font-weight: bold; display: block; margin-bottom: 3px; text-transform: uppercase; }
        .ip-text { color: #fff; font-family: 'VT323', monospace; font-size: 22px; letter-spacing: 1px; }

        /* ---------------- Nav cards (Store / Discord / Who) ---------------- */
        .nav-row { display: flex; justify-content: center; align-items: stretch; gap: 18px; flex-wrap: wrap; margin-top: 28px; }

        .nav-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            min-width: 170px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .nav-card-icon { width: 26px; height: 26px; }
        .nav-card-icon svg { width: 100%; height: 100%; }

        .nav-card-label { font-family: 'VT323', monospace; font-size: 24px; letter-spacing: 2px; color: #fff; }
        .nav-card-count { font-family: 'VT323', monospace; font-size: 15px; color: var(--text-muted); letter-spacing: 1px; }

        .nav-card--store { border-color: rgba(255, 217, 61, 0.35); }
        .nav-card--store .nav-card-icon svg { fill: var(--gold); }
        .nav-card--store:hover { border-color: var(--gold); box-shadow: 0 0 16px rgba(255, 217, 61, 0.35); transform: translateY(-3px); }

        .nav-card--discord .nav-card-icon svg { fill: var(--discord-purple); }
        .nav-card--discord:hover { border-color: var(--discord-purple); box-shadow: 0 0 16px rgba(142, 92, 255, 0.45); transform: translateY(-3px); }

        .nav-card--info { border-color: rgba(32, 197, 183, 0.35); }
        .nav-card--info .nav-card-icon svg { fill: var(--aqua); }
        .nav-card--info:hover { border-color: var(--aqua); box-shadow: 0 0 16px rgba(32, 197, 183, 0.45); transform: translateY(-3px); }

        .live-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background-color: #3BE37A;
            box-shadow: 0 0 6px #3BE37A;
            margin-right: 6px;
            vertical-align: middle;
        }

        /* ---------------- Social Icons ---------------- */
        .social-row { display: flex; justify-content: center; align-items: center; gap: 18px; margin-top: 20px; flex-wrap: wrap; }

        .icon-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .icon-btn svg { width: 22px; height: 22px; transition: fill 0.25s ease; }

        .icon-btn--tiktok svg { fill: #ffffff; }
        .icon-btn--tiktok:hover { border-color: var(--aqua); box-shadow: 0 0 16px rgba(32, 197, 183, 0.5); transform: translateY(-2px); }

        .icon-btn--youtube { border-color: rgba(229, 72, 77, 0.4); box-shadow: 0 0 10px rgba(229, 72, 77, 0.25); }
        .icon-btn--youtube svg { fill: #ff4d4f; }
        .icon-btn--youtube:hover { border-color: #ff4d4f; box-shadow: 0 0 18px rgba(255, 77, 79, 0.6); transform: translateY(-2px); }

        .icon-btn--instagram { border-color: rgba(220, 39, 67, 0.4); box-shadow: 0 0 10px rgba(220, 39, 67, 0.25); }
        .icon-btn--instagram:hover { border-color: var(--ig-pink); box-shadow: 0 0 18px rgba(220, 39, 67, 0.6); transform: translateY(-2px); }

        /* ---------------- Language toggle (top right, one click swap) ---------------- */
        .lang-btn {
            position: fixed;
            top: 22px; right: 22px;
            z-index: 7;
            width: 46px; height: 46px;
            border-radius: 50%;
            background-color: var(--card-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.25s ease;
        }

        .lang-btn:hover { border-color: var(--aqua); box-shadow: 0 0 14px rgba(32, 197, 183, 0.4); transform: scale(1.05); }

        /* ---------------- Confirm-leave modal ---------------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(1, 10, 18, 0.65);
            backdrop-filter: blur(3px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.22s ease, visibility 0.22s ease;
        }

        .modal-overlay.show { opacity: 1; visibility: visible; }

        .modal-box {
            background-color: rgba(1, 42, 74, 0.96);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px 28px 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            transform: scale(0.9) translateY(8px);
            transition: transform 0.22s ease;
        }

        .modal-overlay.show .modal-box { transform: scale(1) translateY(0); }

        .modal-text { font-family: 'VT323', monospace; font-size: 24px; color: #fff; margin: 0 0 22px 0; line-height: 1.3; }
        .modal-actions { display: flex; justify-content: center; gap: 14px; }

        .modal-btn {
            font-family: 'VT323', monospace;
            font-size: 20px;
            letter-spacing: 1px;
            padding: 10px 26px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn--cancel { background-color: var(--danger); color: #fff; }
        .modal-btn--cancel:hover { background-color: #E85454; }
        .modal-btn--go { background-color: var(--success); color: #012A4A; }
        .modal-btn--go:hover { background-color: #28b463; }

        /* ---------------- Wave Divider ---------------- */
        .wave-divider { width: 100%; max-width: 960px; display: block; margin-bottom: 35px; opacity: 0.7; }

        /* ---------------- Footer ---------------- */
        footer { width: 100%; max-width: 960px; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 30px; text-align: center; }

        .footer-brand { font-family: 'VT323', monospace; font-size: 24px; color: #fff; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .footer-dot { width: 8px; height: 8px; background-color: var(--gold); border-radius: 50%; box-shadow: 0 0 8px var(--gold); }
        .disclaimer { font-size: 11px; color: var(--text-muted); margin-bottom: 25px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            transition: color 0.2s;
            text-transform: uppercase;
            cursor: pointer;
        }

        .footer-links a:hover { color: var(--aqua); }

        /* ---------------- Copyright badge ---------------- */
        .copyright-badge {
            position: fixed;
            bottom: 14px; right: 16px;
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(1, 42, 74, 0.6);
            border: 1px solid var(--card-border);
            padding: 6px 12px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            z-index: 2;
        }

        /* ---------------- Toast Notification ---------------- */
        #toast {
            visibility: hidden;
            min-width: 250px;
            max-width: 86vw;
            background-color: var(--aqua-dark);
            border: 1px solid var(--aqua);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 8;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-family: 'VT323', monospace;
            font-size: 24px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #toast.show { visibility: visible; opacity: 1; }

        /* ====================================================
           Responsive: tablets (iPad) and phones
           ==================================================== */
        @media (max-width: 820px) {
            body { padding: 32px 16px 0; }
            .server-title { font-size: 42px; }
            .nav-card { min-width: 150px; padding: 14px 20px; }
        }

        @media (max-width: 540px) {
            body { padding: 26px 14px 0; }
            .server-title { font-size: 34px; }
            .server-subtitle { font-size: 15px; letter-spacing: 3px; }
            .page-tag { font-size: 14px; letter-spacing: 2px; }
            .ip-container { gap: 10px; }
            .ip-box { padding: 10px 16px; min-width: 0; width: 100%; max-width: 280px; }
            .ip-text { font-size: 19px; }
            .nav-row { flex-direction: column; align-items: stretch; gap: 12px; margin-top: 22px; }
            .nav-card { min-width: 0; padding: 14px 18px; }
            .social-row { gap: 14px; }
            .icon-btn { width: 44px; height: 44px; }
            .lang-btn { width: 40px; height: 40px; top: 14px; right: 14px; font-size: 17px; }
            .modal-text { font-size: 20px; }
            .modal-btn { font-size: 17px; padding: 9px 20px; }
            .copyright-badge { font-size: 9px; padding: 5px 9px; bottom: 8px; right: 8px; }
            #toast { font-size: 19px; min-width: 0; padding: 13px; }
        }

        @media (max-width: 360px) {
            .server-title { font-size: 28px; }
        }
    </style>
</head>

                <a href="#" class="icon-btn icon-btn--instagram" aria-label="Instagram" onclick="comingSoon(event)">

        <svg class="wave-divider" viewBox="0 0 960 40" preserveAspectRatio="none">
            <path d="M0,20 C160,40 320,0 480,20 C640,40 800,0 960,20 L960,40 L0,40 Z" fill="#20C5B7" fill-opacity="0.15"/>

        <footer>
            <div class="footer-brand">
                <div class="footer-dot"></div>
                VOLDMC
            </div>
            <div class="disclaimer" data-i18n="disclaimer">Not associated with Mojang or Microsoft</div>
            <div class="footer-links">
                <a href="#" data-i18n="footerStorePolicy" onclick="confirmNav('https://discord.gg/nHqhW9dxvK','Discord', event)">STORE PRIVACY POLICY</a>
                <a href="#" data-i18n="footerVoldPolicy" onclick="confirmNav('https://discord.gg/nHqhW9dxvK','Discord', event)">VOLDMC PRIVACY POLICY</a>
                <a href="#" data-i18n="footerSupport" onclick="confirmNav('https://discord.gg/nHqhW9dxvK','Discord', event)">SUPPORT</a>
            </div>
        </footer>

    </div>

    <script>
        /* ---------------- Translations ---------------- */
        const translations = {
            pageTagMain:      { en: 'MAIN',  ar: 'الرئيسية' },
            seasonSubtitle:   { en: 'SEASON 2', ar: 'الموسم 2' },
            ipLabel:          { en: 'IP', ar: 'الايبي' },
            portLabel:        { en: 'PORT', ar: 'البورت' },
            navStoreLabel:    { en: 'STORE', ar: 'المتجر' },
            navDiscordLabel:  { en: 'DISCORD', ar: 'ديسكورد' },
            navWhoLabel:      { en: 'WHO WE ARE?', ar: 'من نحن؟' },
            membersWord:      { en: 'Members', ar: 'عضو' },
            disclaimer:       { en: 'Not associated with Mojang or Microsoft', ar: 'الموقع غير مرتبط بشركة Mojang أو Microsoft' },
            footerStorePolicy:{ en: 'STORE PRIVACY POLICY', ar: 'سياسة خصوصية المتجر' },
            footerVoldPolicy: { en: 'VOLDMC PRIVACY POLICY', ar: 'سياسة خصوصية VoldMC' },
            footerSupport:    { en: 'SUPPORT', ar: 'الدعم' },
            copiedMsg:        { en: 'COPIED TO CLIPBOARD!', ar: 'تم النسخ!' },
            comingSoonMsg:    { en: 'COMING SOON!', ar: 'قريبًا!' },
            confirmQuestion:  { en: 'Do you want to go to {name}?', ar: 'هل تريد الذهاب إلى {name}؟' },
            cancelBtn:        { en: 'Cancel', ar: 'إلغاء' },
            goBtn:            { en: 'Go', ar: 'الذهاب' }
        };

        let currentLang = 'en';
        let pendingUrl = null;
        let pendingLabel = '';

        function t(key) {
            return (translations[key] && translations[key][currentLang]) || key;
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
            updateDiscordCountDisplay();
            if (document.getElementById('confirmOverlay').classList.contains('show')) {
                updateConfirmText();
            }
        }

        /* ---------------- One-click language toggle (en <-> ar) ---------------- */
        function toggleLanguage() {
            setLanguage(currentLang === 'en' ? 'ar' : 'en');
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.getElementById('langBtn').textContent = lang === 'en' ? '🇺🇸' : '🇮🇶';
            applyTranslations();
        }

        /* ---------------- Toast ---------------- */
        function showToast(message, duration) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'show';
            setTimeout(function () {
                toast.className = toast.className.replace('show', '');
            }, duration || 2500);
        }

        function copyText(text) {
            const tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast(t('copiedMsg'));
        }

        function comingSoon(e) {
            if (e) e.preventDefault();
            showToast(t('comingSoonMsg'));
        }

        /* ---------------- Confirm-before-leaving modal ---------------- */
        function updateConfirmText() {
            document.getElementById('confirmText').textContent = t('confirmQuestion').replace('{name}', pendingLabel);
        }

        function confirmNav(url, label, e) {
            if (e) e.preventDefault();
            pendingUrl = url;
            pendingLabel = label;
            updateConfirmText();
            document.getElementById('confirmOverlay').classList.add('show');
        }

        function closeConfirm() {
            document.getElementById('confirmOverlay').classList.remove('show');
            pendingUrl = null;
        }

        document.getElementById('confirmGoBtn').addEventListener('click', function () {
            if (pendingUrl) window.open(pendingUrl, '_blank');
            closeConfirm();
        });

        document.getElementById('confirmOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeConfirm();
        });

        /* ---------------- Ambient Ocean Bubbles ---------------- */
        const bubblesContainer = document.getElementById('bubblesContainer');

        function spawnAmbientBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'ambient-bubble';
            const size = Math.random() * 22 + 8;
            const duration = Math.random() * 6 + 7;
            const drift = (Math.random() * 80 - 40) + 'px';
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = (Math.random() * 100) + 'vw';
            bubble.style.animationDuration = duration + 's';
            bubble.style.setProperty('--drift', drift);
            bubblesContainer.appendChild(bubble);
            setTimeout(function () { bubble.remove(); }, duration * 1000 + 300);
        }

        for (let i = 0; i < 10; i++) {
            setTimeout(spawnAmbientBubble, i * 180);
        }
        setInterval(spawnAmbientBubble, 420);

        /* ---------------- Mouse Trail Bubbles (desktop only) ---------------- */
        let lastTrailTime = 0;
        if (window.matchMedia('(pointer: fine)').matches) {
            document.addEventListener('mousemove', function (e) {
                const now = Date.now();
                if (now - lastTrailTime < 55) return;
                lastTrailTime = now;

                const bubble = document.createElement('div');
                bubble.className = 'trail-bubble';
                const size = Math.random() * 10 + 6;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = (e.clientX - size / 2) + 'px';
                bubble.style.top = (e.clientY - size / 2) + 'px';
                document.body.appendChild(bubble);

                setTimeout(function () { bubble.remove(); }, 1200);
            });
        }

        /* ---------------- Live Discord Member Count ---------------- */
        const DISCORD_INVITE_CODE = 'nHqhW9dxvK';
        const DISCORD_FALLBACK_COUNT = '75+';
        let discordMemberCount = null;

        function updateDiscordCountDisplay() {
            const el = document.getElementById('discordCount');
            if (!el) return;
            if (discordMemberCount !== null) {
                el.innerHTML = '<span class="live-dot"></span>' + discordMemberCount + ' ' + t('membersWord');
            } else {
                el.textContent = DISCORD_FALLBACK_COUNT + ' ' + t('membersWord');
            }
        }

        async function loadDiscordCount() {
            try {
                const res = await fetch('https://discord.com/api/v10/invites/' + DISCORD_INVITE_CODE + '?with_counts=true');
                if (!res.ok) throw new Error('bad response');
                const data = await res.json();
                if (typeof data.approximate_member_count === 'number') {
                    discordMemberCount = data.approximate_member_count;
                } else {
                    throw new Error('no count in response');
                }
            } catch (err) {
                discordMemberCount = null;
            }
            updateDiscordCountDisplay();
        }

        document.addEventListener('DOMContentLoaded', function () {
            applyTranslations();
            loadDiscordCount();
        });
    </script>

</body>
